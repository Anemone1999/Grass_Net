defaults: # which model/schedule config file to use
- model: sphnet
- schedule: polynomial 
- _self_

hydra_path: ./outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
job_id: test # The checkpoint/log file is saved in ckpt_path/job_id
ckpt_path: ${hydra_path}/ckpts # the checkpoint path, default to hydra's run dir
seed: 123
log_dir: ${hydra_path}/logs
debug: false

hydra:
  run:
    dir: ${hydra_path}

wandb: # wandb configuration
  open: False
  wandb_api_key: Ii4hWrYUbNOgvucYqPrQv
  wandb_project: "sphnet_debug"
  save_dir: ${hydra_path}/swanlab
  wandb_name: "test_run"
  wandb_group: ""
  wandb_notes: ""

#########
# trainer related config
model_backbone: SPHNet

hami_model:
  name: HamiHead_sphnet
  irreps_edge_embedding: null
  num_layer: 2
  max_radius_cutoff: 30  # hami head cut off, default full connected
  radius_embed_dim: 16
  bottle_hidden_size: 32

finetune_flag: false # distinguish whether the task is a finetune task
finetune_path: "./null" # the checkpoint path for finetuning, if finetune_flag is true, this needs to be set
finetune_ckpt_path: "./null" # the .pt file to build sparse tensor product, generated in pretraining
pred_target: "H" # H denotes Hamiltonian, X denotes rotation matrix
use_sparse_tp: true # whether use the sparse tensor product gate
sparsity: 0.7 #Sparsity ratio
num_epochs: 3000000 #Maximum number of epochs
max_steps: 200000 #Maximum number of training steps.
batch_size: 16
inference_batch_size: 16
dataloader_num_workers: 8
lr: 1e-3
multi_para_group: false
weight_decay: 0
enable_hami: true
enable_energy_hami_error: false # whether to calculate the occupiedenergy MAE and C similarity during validation. This is very slow.
enable_hami_orbital_energy: false # set it to true for WALoss
enable_DM: false # set it to true for density matrix loss
enable_ortho_DM: false # whether to calculate the orthogonal density matrix error
enable_exceed_pi: false # whether to allow K to exceed [-pi, pi], only used when enable_DM is true
enable_energy_align_DM: false # whether to calculate the energy aligned density matrix error
enable_trHD: false # Tr(H * D)
enable_rho: false # real space charge density
enable_ecore: false
enable_dipole: false
enable_total_energy: false # whether to evaluate the total energy error during validation. This is very slow.
enable_acc_ratio: false # whether to evaluate the acc ratio during validation. This is very slow.
enable_DM_based_H: false # whether to compute H from D_pred and validate H error in validation. This is very slow.
max_sample_for_total_energy: 100 # if enable_total_energy is true, the max number of samples to evaluate total energy error.
hami_weight: 1
dm_weight: 1
orbital_energy_weight: 0
ortho_dm_weight: 0
exceed_pi_weight: 0
energy_align_dm_weight: 0
trHD_weight: 0
rho_weight: 0
xc_type: "b3lyp5"
pos_unit: "angstrom"
hami_train_loss: 'maemse'
hami_val_loss: 'mae'
dm_train_loss: 'mae'
ortho_dm_train_loss: 'mae'
energy_align_dm_train_loss: 'mae'
trHD_train_loss: 'mae'
trHD_val_loss: 'mae'
rho_train_loss: 'mae'
rho_val_loss: 'mae'
dm_val_loss: 'mae'
ortho_dm_val_loss: 'mae'
energy_align_dm_val_loss: 'mae'
ed_type: 'naive' # [naive, trunc]
ed_trunc_factor: 3.0
ngpus: 1
num_nodes: 1
precision: 32 # the precison for training, can use 16 for mixed precision
gradient_clip_val: 5.0
early_stopping_patience: 300000
val_check_interval: null #follow pytorch lightning
test_interval: 10 #Test interval, one test per n epochs (default: 10) # NOT used
save_interval: 10 #Save interval, one save per n epochs (default: 10)
############
# data realted config
# data_name: pubchem  #the target dataset
# basis: "def2-tzvp"  #when predict hamitonian, the basis need to be set
# dataset_path : "/data/pubchem/"  # if the dataset is lmdb format, enter the folder path

# data_name: qh9_stable_iid # four kinds of data splits: qh9_stable_iid, qh9_stable_ood, qh9_dynamic_mol, qh9_dynamic_geo
# basis: "def2-svp"
# dataset_path : "/data/qh9stable/data.mdb"     # if the dataset is mdb format, enter the file path
# # dataset_path : "/data/qh9dynamic/data.mdb"

# data_name: md17
# basis: "def2-svp"
# dataset_path : "/data/md17/ethanol/data.mdb"

data_name: custom
basis: "def2-svp"
dataset_path : "example_data/data.mdb"
acc_path: "."
index_path : "."

dataset_size : 1000 #the dataset size is used. This will decide the steps of different phases"
train_ratio: 0.8
val_ratio: 0.1
test_ratio: 0.1
used_cache: false
ema_decay: 1 # 1 means trun off ema and (0,1) is turning on.
unit: 1 # 627.503 if the unit in the dataset is kcal/mol, else set 1; the unit used in this model is hatree
############
# model related config
activation: "silu"
remove_init: true # fock - init if remove_init else fock
remove_atomref_energy: true # when true, energy = energy - eachtype_atom_count*atom_ref
num_sanity_val_steps: 0